# Set prefix to Ctrl-a instead of default Ctrl-b
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix
set -g base-index 1

# Terminal setup
set -g default-terminal "screen-256color"
set -g history-limit 10000
set -g mouse on

# --- Panes ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


# resize panes 
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Smart pane switching with awareness of Vim splits
s_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE 'vim|nvim'"
bind-key -n 'C-h' if-shell "$s_vim" "send-keys C-h" "select-pane -L"
bind-key -n 'C-j' if-shell "$s_vim" "send-keys C-j" "select-pane -D"
bind-key -n 'C-k' if-shell "$s_vim" "send-keys C-k" "select-pane -U"
bind-key -n 'C-l' if-shell "$s_vim" "send-keys C-l" "select-pane -R"

# --- Status Bar ---
set-option -g status-position bottom
set-option -g status-style fg='#D7B99D',bg='#2E3440' # Background matches Neovim NORMAL mode

# Set window status colors with blue accent
set-window-option -g window-status-style fg='#A68F7D',bg='#2E3440'
set-window-option -g window-status-current-style fg='#32afff',bg='#4A3C2F',underscore

# Set pane border colors with blue active border
set-option -g pane-border-style fg='#A68F7D'
set-option -g pane-active-border-style fg='#32afff'

# Set message colors
set-option -g message-style fg='#32afff',bg='#2E3440'

# --- Left Status Section ---
set-option -g status-left-length 40
set-option -g status-left '#[fg=#32afff,bg=#2E3440] #S #[fg=#4A3C2F,bg=#2E3440,nobold]'

# --- Window Status Section ---
set-window-option -g window-status-format '#[fg=#A68F7D,bg=#2E3440] #I:#W '
set-window-option -g window-status-current-format '#[fg=#32afff,bg=#4A3C2F] #I:#W #[fg=#4A3C2F,bg=#2E3440,nobold]'

# --- Right Status Section ---
set-option -g status-right-length 50
set-option -g status-right '#[fg=#A68F7D,bg=#2E3440] %H:%M #[fg=#FF99CC,bg=#2E3440] %d %b %Y '


# the above will be overridden by the the plugins below
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Plugins ---
set -g @tmux2k-theme 'duo'
# to show icons only
set -g @tmux2k-icons-only true

# to customize duo bg and fg
set -g @tmux2k-duo-fg "#1688f0" # blue text
set -g @tmux2k-duo-bg "#1e1e2e" # dark background

# Override specific plugin colors for better contrast
set -g @tmux2k-black "#1e1e2e"
set -g @tmux2k-gray "#3a3a4a"
set -g @tmux2k-white "#ffffff"

# to set powerline symbols
set -g @tmux2k-right-sep  # alternate right status bar sep

set -g @tmux2k-show-powerline false

set -g @tmux2k-left-plugins "session git duo"
set -g @tmux2k-right-plugins "battery clock cpu memory time weather"

set -g @tmux2k-session-icon " #S" # `#W` for window name
set -g @plugin '2kabhishek/tmux2k'
set -g @plugin 'fabioluciano/tmux-tokyo-night'

# too much overhead it show old sessions that are not needed
# set -g @continuum-save-interval '15'
# run-shell 'find ~/.tmux/resurrect/ -type f -mmin +1080 -delete 2>/dev/null'

# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
